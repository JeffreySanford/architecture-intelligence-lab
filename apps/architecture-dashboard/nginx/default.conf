server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    proxy_pass http://spring-api:8080/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /gateway/ {
    proxy_pass http://nest-api:3000/gateway/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /socket.io/ {
    proxy_pass http://nest-api:3000/socket.io/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
  }

  location /swagger/spring/ {
    proxy_pass http://spring-api:8080/swagger-ui/;
    proxy_set_header Host $host;
  }

  location /swagger/nest/ {
    proxy_pass http://nest-api:3000/swagger/;
    proxy_set_header Host $host;
  }

  location /pgadmin/ {
    proxy_pass http://pgadmin:80/;
    proxy_set_header Host $host;
  }

  location /redis-insight/ {
    proxy_pass http://redis-insight:8001/;
    proxy_set_header Host $host;
  }
}
