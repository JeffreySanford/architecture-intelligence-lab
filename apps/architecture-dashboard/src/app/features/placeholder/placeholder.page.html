<section class="placeholder">
  <p class="placeholder__eyebrow">{{ pageData().eyebrow }}</p>
  <h1>{{ pageData().title }}</h1>
  <p>{{ pageData().description }}</p>

  <mat-card appearance="outlined">
    <mat-card-header>
      <mat-card-title>Implementation checkpoint</mat-card-title>
      <mat-card-subtitle>Route shell is active</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <mat-chip-set aria-label="Feature status">
        <mat-chip>Routed</mat-chip>
        <mat-chip>Sidebar linked</mat-chip>
        <mat-chip>Data pending</mat-chip>
      </mat-chip-set>
    </mat-card-content>
  </mat-card>
</section>
