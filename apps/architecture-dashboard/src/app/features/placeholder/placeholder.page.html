<section class="placeholder">
  <p class="placeholder__eyebrow">{{ pageData().eyebrow }}</p>
  <h1>{{ pageData().title }}</h1>
  <p>{{ pageData().description }}</p>

  <p-card class="placeholder__card">
    <ng-template pHeader>
      <div class="placeholder__card-title-group">
        <div class="placeholder__card-title">Implementation checkpoint</div>
        <div class="placeholder__card-subtitle">Route shell is active</div>
      </div>
    </ng-template>
    <div class="placeholder__card-content">
      <div class="placeholder__status-chips" aria-label="Feature status">
        <p-chip label="Routed"></p-chip>
        <p-chip label="Sidebar linked"></p-chip>
        <p-chip label="Data pending"></p-chip>
      </div>
    </div>
  </p-card>
</section>
