<div class="lab-shell">
  <aside class="lab-shell__nav">
    <div class="lab-shell__brand">
      <a pButton type="button" label="Architecture Lab" class="lab-shell__brand-title p-button-text" routerLink="/">
        Architecture Lab
      </a>
      <p>Training workspace</p>
    </div>

    <div class="lab-shell__nav-divider"></div>

    <nav aria-label="Lab views" class="lab-shell__nav-list">
      @for (item of visibleNavItems(); track item.route) {
        <a
          pButton
          type="button"
          class="lab-shell__nav-item p-button-text"
          [routerLink]="item.route"
          routerLinkActive="lab-shell__nav-item--active"
        >
          <span class="lab-shell__nav-item-label">{{ item.label }}</span>
          <span class="lab-shell__nav-item-description">{{ item.description }}</span>
        </a>
      }
    </nav>
  </aside>

  <div class="lab-shell__content">
    <div class="lab-shell__toolbar">
      <span>Architecture Intelligence Lab</span>
      <span class="lab-shell__spacer"></span>
      @if (currentUser(); as user) {
        <span class="lab-shell__persona">
          {{ user.persona?.name ?? 'Unknown' }} · {{ user.persona?.role ?? 'Unknown' }}
        </span>
      }
      <a pButton type="button" label="Change Persona" class="p-button-text" routerLink="/">
        Change Persona
      </a>
    </div>

    <main class="lab-shell__main">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
